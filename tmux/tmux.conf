#✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪
# Tmux config
#✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪✪

set -g default-shell $SHELL

##########################################################
# Bindings
##########################################################

# Vim/Emacs like key binding on copy-mode (to terminate C-x c)
set-window-option -g mode-keys vi
set -g status-keys vi

# Set the prefix key
unbind-key C-b
set -g prefix C-Space
bind Space send-prefix

# Use | and - to split a window vertically and horizontally instead of " and % respectively
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Toggle select pane
bind C-Space last-pane

# Select pane with vim-like keybinding
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Rename pane title
bind -r C-t command-prompt -p "pane title:" "select-pane -T '%%'"

# Resize the pane with arrow keys
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Show pane title on border
set -g pane-border-status top
set -g pane-border-format "#{pane_index}: #{pane_title}" # command-prompt "select-pane -T '%%'" to rename the current pane

# Use m and M to toggle mouse mode on and off respectively
unbind m
unbind M
bind-key m \
  set -w mouse on \;\
  display 'Mouse mode on'
bind-key M \
  set -w mouse off \;\
  display 'Mouse mode off'

# Reload ~/.tmux.conf
unbind C-r
bind C-r source-file ~/.tmux.conf \; display 'Reloaded tmux config'

# Open ~/.tmux.conf in vim and reload settings on quit
unbind C-e
bind C-e new-window -n '~/.tmux.conf' "sh -c 'vim ~/.tmux.conf && tmux source ~/.tmux.conf'"

##########################################################
# Other settings
##########################################################

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Set window index beginning number to 1 (the default value is 0)
set -g base-index 1
set -g pane-base-index 1

# Remove the default 500ms delay after Esc — fixes lag when leaving insert mode in vim/neovim
set -sg escape-time 10

# Bigger scrollback buffer (default is 2000)
set -g history-limit 10000

##########################################################
# Theme (Statusbar)
##########################################################

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Refresh status line every 5 seconds
set -g status-interval 5

# Length of tmux status line
set -g status-left-length 30
set -g status-right-length 150

# Set the background colors
set -g status-bg colour8

# Make active pane border blue
set -g pane-active-border-style fg=colour1

# Set the left and right status
set -g status-left '#[bg=colour7]#[fg=colour0]#{?client_prefix,#[bg=colour2],} #h ❐ #S #[bg=colour8]#[fg=colour7]#{?client_prefix,#[fg=colour2],}#{?window_zoomed_flag, 🔍 , 🦍 }#[fg=colour1] '
set -g status-right '#[bg=colour8]#[fg=colour7]#[bg=colour7]#[fg=colour0] %b %d %H:%M '

# Customize how windows are displayed in the status line
set -g window-status-format "#[fg=colour236]#[bg=colour8]#I-#[fg=colour236]  #W"
set -g window-status-current-format "#[fg=colour8]#[bg=colour190]#[fg=colour23]#[bg=colour190] #I*  #W #[fg=colour190]#[bg=colour8]"

# Style the message window
set -g message-style bg=colour8,fg=colour190

##########################################################
# Copy and mouse
##########################################################

set -g mouse on

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi C-WheelUpPane send-keys -X halfpage-up
bind -T copy-mode-vi C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clipboard

# v/y/Enter/MouseDragEnd1Pane copy-mode bindings live in the OS-specific env
# file below, since the clipboard command (pbcopy / xclip / wl-copy) differs
# per platform. Unbind the vi-mode defaults here so the env file is the only
# place that owns them.
unbind -T copy-mode-vi v
unbind -T copy-mode-vi y
unbind -T copy-mode-vi Enter
unbind -T copy-mode-vi MouseDragEnd1Pane

##########################################################
# OS Specific
##########################################################

# see =../linux/tmux.env.conf= and =../macos/tmux.env.conf=
source ~/.tmux.env.conf

##########################################################
# Plugins (managed by TPM: https://github.com/tmux-plugins/tpm)
##########################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore the last saved session whenever tmux starts
# set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
